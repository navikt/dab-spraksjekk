name: Build and publish library

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    permissions:
      id-token: write
      contents: 'read'
      packages: 'write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6.4.0
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@navikt'
          node-version: 25
          cache: 'pnpm'
      - name: Install dependencies
        shell: bash
        run: pnpm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
